<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GridIQ West Africa | Loss Intelligence Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style type="text/tailwindcss">
        @layer base {
            :root {
                --color-bg: #0B0F19;
                --color-surface: #111827;
                --color-surface-raised: #1F2937;
                --color-border: #374151;
                --color-primary: #0D9E75;
                --color-primary-glow: rgba(13, 158, 117, 0.15);
                --color-text: #F9FAFB;
                --color-text-muted: #9CA3AF;
                --color-danger: #EF4444;
                --color-warning: #F59E0B;
                --color-info: #3B82F6;
                --font-sans: 'Inter', sans-serif;
                --font-mono: 'JetBrains Mono', monospace;
            }
            body {
                font-family: var(--font-sans);
                background-color: var(--color-bg);
                color: var(--color-text);
                overflow: hidden;
            }
        }
        @layer components {
            .glass-panel {
                background: rgba(17, 24, 39, 0.7);
                backdrop-filter: blur(12px);
                border: 1px solid var(--color-border);
            }
            .neon-glow {
                box-shadow: 0 0 20px var(--color-primary-glow);
            }
            .text-glow {
                text-shadow: 0 0 10px rgba(13, 158, 117, 0.5);
            }
            .slide-in {
                animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            }
            @keyframes slideIn {
                from { opacity: 0; transform: translateY(20px); }
                to { opacity: 1; transform: translateY(0); }
            }
            .fade-in {
                animation: fadeIn 0.3s ease-out forwards;
            }
            @keyframes fadeIn {
                from { opacity: 0; }
                to { opacity: 1; }
            }
            .chart-path {
                stroke-dasharray: 1000;
                stroke-dashoffset: 1000;
                animation: drawChart 1.5s ease-out forwards;
            }
            @keyframes drawChart {
                to { stroke-dashoffset: 0; }
            }
            .skeleton {
                background: linear-gradient(90deg, #1F2937 25%, #374151 50%, #1F2937 75%);
                background-size: 200% 100%;
                animation: shimmer 1.5s infinite;
            }
            @keyframes shimmer {
                0% { background-position: 200% 0; }
                100% { background-position: -200% 0; }
            }
            .toast-enter {
                animation: toastIn 0.3s ease-out forwards;
            }
            @keyframes toastIn {
                from { transform: translateX(100%); opacity: 0; }
                to { transform: translateX(0); opacity: 1; }
            }
        }
    </style>
</head>
<body class="h-screen w-screen flex text-sm">

    <!-- Login Screen -->
    <div id="login-screen" class="fixed inset-0 z-50 flex items-center justify-center bg-[#0B0F19] bg-[url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMTAwIiBoZWlnaHQ9IjEwMCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48ZGVmcz48cGF0dGVybiBpZD0iZ3JpZCIgd2lkdGg9IjEwMCIgaGVpZ2h0PSIxMDAiIHBhdHRlcm5Vbml0cz0idXNlclNwYWNlT25Vc2UiPjxwYXRoIGQ9Ik0gMTAwIDAgTCAwIDAgMCAxMDAiIGZpbGw9Im5vbmUiIHN0cm9rZT0iIzE3MjU0NyIgc3Ryb2tlLXdpZHRoPSIxIi8+PC9wYXR0ZXJuPjwvZGVmcz48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWxsPSJ1cmwoI2dyaWQpIiAvPjwvc3ZnPg==')] bg-cover">
        <div class="absolute inset-0 bg-gradient-to-br from-[#0D9E75]/10 via-transparent to-[#0B0F19]"></div>
        <div class="relative z-10 w-full max-w-md p-8">
            <div class="text-center mb-8 slide-in">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-[#0D9E75]/20 border border-[#0D9E75]/30 mb-4">
                    <i data-lucide="zap" class="w-8 h-8 text-[#0D9E75]"></i>
                </div>
                <h1 class="text-3xl font-bold tracking-tight text-white mb-1">GridIQ</h1>
                <p class="text-[#9CA3AF] text-sm">West Africa Loss Intelligence</p>
            </div>

            <div class="glass-panel rounded-2xl p-6 shadow-2xl shadow-black/50 slide-in" style="animation-delay: 0.1s">
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-medium text-[#9CA3AF] mb-1.5">Email Address</label>
                        <input type="email" id="login-email" value="ops@edsa.sl" class="w-full bg-[#0B0F19] border border-[#374151] rounded-lg px-4 py-2.5 text-white placeholder-[#4B5563] focus:outline-none focus:border-[#0D9E75] focus:ring-1 focus:ring-[#0D9E75] transition-all">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-[#9CA3AF] mb-1.5">Password</label>
                        <input type="password" id="login-password" value="gridiq2025" class="w-full bg-[#0B0F19] border border-[#374151] rounded-lg px-4 py-2.5 text-white placeholder-[#4B5563] focus:outline-none focus:border-[#0D9E75] focus:ring-1 focus:ring-[#0D9E75] transition-all">
                    </div>
                    <button onclick="handleLogin()" class="w-full bg-[#0D9E75] hover:bg-[#0D9E75]/90 text-white font-medium py-2.5 rounded-lg transition-all transform hover:scale-[1.02] active:scale-[0.98] shadow-lg shadow-[#0D9E75]/20">
                        Sign In to Platform
                    </button>
                </div>

                <div class="mt-6 pt-6 border-t border-[#374151]">
                    <p class="text-xs text-[#9CA3AF] text-center mb-3">Quick Access Demo Accounts</p>
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="quickLogin('ops@edsa.sl')" class="text-xs bg-[#1F2937] hover:bg-[#374151] text-[#9CA3AF] py-2 px-3 rounded-md transition-colors text-left">
                            <span class="block font-medium text-white">Operations</span>
                            ops@edsa.sl
                        </button>
                        <button onclick="quickLogin('management@edsa.sl')" class="text-xs bg-[#1F2937] hover:bg-[#374151] text-[#9CA3AF] py-2 px-3 rounded-md transition-colors text-left">
                            <span class="block font-medium text-white">Management</span>
                            management@edsa.sl
                        </button>
                        <button onclick="quickLogin('auditor@edsa.sl')" class="text-xs bg-[#1F2937] hover:bg-[#374151] text-[#9CA3AF] py-2 px-3 rounded-md transition-colors text-left">
                            <span class="block font-medium text-white">Auditor</span>
                            auditor@edsa.sl
                        </button>
                        <button onclick="quickLogin('agent@edsa.sl')" class="text-xs bg-[#1F2937] hover:bg-[#374151] text-[#9CA3AF] py-2 px-3 rounded-md transition-colors text-left">
                            <span class="block font-medium text-white">Field Agent</span>
                            agent@edsa.sl
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Main App Shell -->
    <div id="app-shell" class="hidden w-full h-full flex">
        <!-- Sidebar -->
        <aside class="w-64 bg-[#111827] border-r border-[#374151] flex flex-col h-full shrink-0 transition-all duration-300" id="sidebar">
            <div class="p-6 border-b border-[#374151]">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-lg bg-[#0D9E75]/20 flex items-center justify-center border border-[#0D9E75]/30">
                        <i data-lucide="zap" class="w-4 h-4 text-[#0D9E75]"></i>
                    </div>
                    <div>
                        <h2 class="font-bold text-white text-sm leading-tight">GridIQ</h2>
                        <p class="text-[10px] text-[#9CA3AF] uppercase tracking-wider">EDSA Pilot</p>
                    </div>
                </div>
            </div>

            <nav class="flex-1 overflow-y-auto p-4 space-y-1" id="nav-container">
                <!-- Nav items injected by JS -->
            </nav>

            <div class="p-4 border-t border-[#374151]">
                <div class="flex items-center gap-3 p-3 rounded-lg bg-[#0B0F19] border border-[#374151]">
                    <div class="w-8 h-8 rounded-full bg-[#374151] flex items-center justify-center text-xs font-medium text-white" id="user-avatar">JD</div>
                    <div class="flex-1 min-w-0">
                        <p class="text-xs font-medium text-white truncate" id="user-name">John Doe</p>
                        <p class="text-[10px] text-[#9CA3AF] truncate" id="user-role">Operations</p>
                    </div>
                    <button onclick="handleLogout()" class="text-[#9CA3AF] hover:text-white transition-colors">
                        <i data-lucide="log-out" class="w-4 h-4"></i>
                    </button>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 flex flex-col h-full overflow-hidden bg-[#0B0F19] relative">
            <!-- Header -->
            <header class="h-16 border-b border-[#374151] flex items-center justify-between px-6 bg-[#111827]/80 backdrop-blur-md z-20">
                <div class="flex items-center gap-4">
                    <button onclick="toggleSidebar()" class="lg:hidden text-[#9CA3AF] hover:text-white">
                        <i data-lucide="menu" class="w-5 h-5"></i>
                    </button>
                    <h1 id="page-title" class="text-lg font-semibold text-white">Live Loss Map</h1>
                </div>
                <div class="flex items-center gap-4">
                    <div class="flex items-center gap-2 text-xs text-[#9CA3AF] bg-[#1F2937] px-3 py-1.5 rounded-full border border-[#374151]">
                        <div class="w-1.5 h-1.5 rounded-full bg-[#0D9E75] animate-pulse"></div>
                        <span id="last-updated">Updated just now</span>
                    </div>
                    <button class="relative text-[#9CA3AF] hover:text-white transition-colors">
                        <i data-lucide="bell" class="w-5 h-5"></i>
                        <span class="absolute -top-1 -right-1 w-4 h-4 bg-[#EF4444] rounded-full text-[10px] flex items-center justify-center text-white font-medium">3</span>
                    </button>
                </div>
            </header>

            <!-- Content Area -->
            <div id="content-area" class="flex-1 overflow-y-auto p-6 relative">
                <!-- Views injected by JS -->
            </div>
        </main>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="fixed bottom-6 right-6 z-50 flex flex-col gap-2 pointer-events-none"></div>

    <!-- Modal Overlay -->
    <div id="modal-overlay" class="fixed inset-0 z-40 bg-black/60 backdrop-blur-sm hidden opacity-0 transition-opacity duration-300 flex items-center justify-center p-4">
        <div id="modal-content" class="bg-[#111827] border border-[#374151] rounded-2xl shadow-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto transform scale-95 transition-transform duration-300">
            <!-- Modal content injected by JS -->
        </div>
    </div>

    <script>
        // Initialize Lucide icons
        lucide.createIcons();

        // State Management
        const state = {
            user: null,
            currentView: 'map',
            sidebarOpen: true,
            zones: [],
            alerts: [],
            investigations: [],
            monthlySnapshots: [],
            auditLog: [],
            isLoading: false,
            simulationInterval: null
        };

        // Configuration
        const ROLES = {
            operations: { label: 'Operations', nav: ['map', 'alerts', 'queue', 'reports', 'roi', 'settings'] },
            management: { label: 'Management', nav: ['dashboard', 'reports', 'roi', 'eis', 'settings'] },
            auditor: { label: 'Auditor', nav: ['audit-log', 'settings'] },
            field_agent: { label: 'Field Agent', nav: ['queue', 'settings'] },
            admin: { label: 'Admin', nav: ['map', 'alerts', 'queue', 'reports', 'roi', 'audit-log', 'eis', 'settings'] }
        };

        const NAV_CONFIG = {
            map: { icon: 'map', label: 'Live Loss Map' },
            dashboard: { icon: 'layout-dashboard', label: 'Dashboard' },
            alerts: { icon: 'bell', label: 'Alert Feed' },
            queue: { icon: 'clipboard-list', label: 'Investigation Queue' },
            reports: { icon: 'bar-chart-3', label: 'Monthly Reports' },
            roi: { icon: 'trending-up', label: 'Impact & ROI' },
            'audit-log': { icon: 'shield', label: 'Audit Log' },
            eis: { icon: 'file-output', label: 'EIS Export' },
            settings: { icon: 'settings', label: 'Settings' }
        };

        // Seed Data Generators
        function generateSeedData() {
            const zoneNames = ['Wilberforce', 'Aberdeen', 'Murray Town', 'Lumley', 'Hill Station', 'Kissy', 'Wellington', 'Cline Town', 'Congo Town', 'Goderich', 'Charlotte', 'Waterloo'];
            const severities = ['normal', 'normal', 'normal', 'elevated', 'elevated', 'elevated', 'elevated', 'high', 'high', 'high', 'critical', 'critical'];
            const colors = { normal: '#10B981', elevated: '#F59E0B', high: '#F97316', critical: '#EF4444' };

            state.zones = zoneNames.map((name, i) => ({
                id: i + 1,
                name,
                feederCode: `FED-${100 + i}`,
                lat: 8.48 + (Math.random() - 0.5) * 0.08,
                lng: -13.23 + (Math.random() - 0.5) * 0.08,
                severity: severities[i],
                color: colors[severities[i]],
                injectedKwh: 15000 + Math.random() * 50000,
                billedKwh: 10000 + Math.random() * 40000,
                ntlPct: severities[i] === 'critical' ? 35 + Math.random() * 10 : severities[i] === 'high' ? 25 + Math.random() * 8 : severities[i] === 'elevated' ? 18 + Math.random() * 5 : 10 + Math.random() * 5,
                lastUpdated: new Date().toISOString(),
                anomalyScore: Math.random(),
                trend: Array.from({length: 12}, () => 30 + Math.random() * 15)
            }));

            const alertTypes = ['meter_bypass', 'illegal_reconnection', 'token_fraud', 'phase_tap'];
            const statuses = ['new', 'assigned', 'investigating', 'confirmed_theft', 'false_positive', 'resolved'];
            const statusColors = { new: '#3B82F6', assigned: '#F59E0B', investigating: '#8B5CF6', confirmed_theft: '#EF4444', false_positive: '#6B7280', resolved: '#10B981' };

            state.alerts = Array.from({length: 180}, (_, i) => ({
                id: i + 1,
                zoneId: Math.floor(Math.random() * 12) + 1,
                accountNumber: `EDSA-${100000 + i}`,
                meterSerial: `MTR-${900000 + i}`,
                type: alertTypes[Math.floor(Math.random() * alertTypes.length)],
                confidence: 0.4 + Math.random() * 0.6,
                estimatedLoss: 500 + Math.random() * 5000,
                status: statuses[Math.floor(Math.random() * statuses.length)],
                statusColor: statusColors[statuses[Math.floor(Math.random() * statuses.length)]],
                assignedTo: Math.random() > 0.5 ? 'Agent Smith' : null,
                createdAt: new Date(Date.now() - Math.random() * 30 * 24 * 60 * 60 * 1000).toISOString(),
                lat: 8.48 + (Math.random() - 0.5) * 0.06,
                lng: -13.23 + (Math.random() - 0.5) * 0.06
            }));

            state.investigations = state.alerts.filter(a => a.status !== 'new').map((alert, i) => ({
                id: i + 1,
                alertId: alert.id,
                zone: state.zones.find(z => z.id === alert.zoneId)?.name || 'Unknown',
                accountNumber: alert.accountNumber,
                type: alert.type,
                confidence: alert.confidence,
                estimatedLoss: alert.estimatedLoss,
                status: alert.status,
                assignedTo: alert.assignedTo || 'Unassigned',
                dispatchedAt: new Date(Date.now() - Math.random() * 20 * 24 * 60 * 60 * 1000).toISOString(),
                arrivedAt: Math.random() > 0.5 ? new Date().toISOString() : null,
                outcome: Math.random() > 0.7 ? 'confirmed' : Math.random() > 0.5 ? 'false_positive' : 'pending',
                notes: '',
                lat: alert.lat,
                lng: alert.lng
            }));

            const actions = ['LOGIN', 'ALERT_VIEWED', 'ALERT_ASSIGNED', 'INVESTIGATION_RECORDED', 'REPORT_DOWNLOADED', 'EIS_SUBMITTED', 'USER_SETTINGS_CHANGED'];
            state.auditLog = Array.from({length: 500}, (_, i) => ({
                id: i + 1,
                timestamp: new Date(Date.now() - Math.random() * 365 * 24 * 60 * 60 * 1000).toISOString(),
                user: ['ops@edsa.sl', 'management@edsa.sl', 'auditor@edsa.sl', 'agent@edsa.sl'][Math.floor(Math.random() * 4)],
                action: actions[Math.floor(Math.random() * actions.length)],
                resource: `Resource-${Math.floor(Math.random() * 1000)}`,
                ip: `192.168.1.${Math.floor(Math.random() * 255)}`,
                userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'
            }));
        }

        // Auth Functions
        function handleLogin() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            if (!email || !password) {
                showToast('Please enter credentials', 'error');
                return;
            }

            const role = email.split('@')[0];
            const roleMap = {
                'ops': 'operations',
                'management': 'management',
                'auditor': 'auditor',
                'agent': 'field_agent',
                'admin': 'admin'
            };

            const userRole = roleMap[role] || 'operations';

            state.user = {
                email,
                role: userRole,
                name: email.split('@')[0].replace(/\./g, ' ').replace(/\b\w/g, l => l.toUpperCase()),
                avatar: email.substring(0, 2).toUpperCase()
            };

            const loginScreen = document.getElementById('login-screen');
            loginScreen.style.opacity = '0';
            loginScreen.style.transition = 'opacity 0.5s ease';

            setTimeout(() => {
                loginScreen.classList.add('hidden');
                document.getElementById('app-shell').classList.remove('hidden');

                generateSeedData();
                initApp();
                startSimulation();

                const defaultView = ROLES[userRole].nav[0];
                navigateTo(defaultView);

                showToast(`Welcome back, ${state.user.name}`, 'success');
            }, 500);
        }

        function quickLogin(email) {
            document.getElementById('login-email').value = email;
            document.getElementById('login-password').value = 'gridiq2025';
            handleLogin();
        }

        function handleLogout() {
            state.user = null;
            clearInterval(state.simulationInterval);
            location.reload();
        }

        // Navigation
        function initApp() {
            document.getElementById('user-name').textContent = state.user.name;
            document.getElementById('user-role').textContent = ROLES[state.user.role].label;
            document.getElementById('user-avatar').textContent = state.user.avatar;
            renderNav();
        }

        function renderNav() {
            const nav = document.getElementById('nav-container');
            const allowedNav = ROLES[state.user.role].nav;

            nav.innerHTML = allowedNav.map((key, index) => `
                <button onclick="navigateTo('${key}')" 
                    class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg transition-all duration-200 group ${state.currentView === key ? 'bg-[#0D9E75]/10 text-[#0D9E75] border border-[#0D9E75]/20' : 'text-[#9CA3AF] hover:bg-[#1F2937] hover:text-white border border-transparent'}"
                    style="animation: slideIn 0.3s ease-out forwards; animation-delay: ${index * 0.05}s; opacity: 0;">
                    <i data-lucide="${NAV_CONFIG[key].icon}" class="w-4 h-4 ${state.currentView === key ? 'text-[#0D9E75]' : 'text-[#6B7280] group-hover:text-white'}"></i>
                    <span class="font-medium text-sm">${NAV_CONFIG[key].label}</span>
                    ${key === 'alerts' ? '<span class="ml-auto bg-[#EF4444] text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full">180</span>' : ''}
                </button>
            `).join('');

            lucide.createIcons();
        }

        function navigateTo(view) {
            if (!ROLES[state.user.role].nav.includes(view)) {
                showToast('Access denied for your role', 'error');
                return;
            }

            state.currentView = view;
            document.getElementById('page-title').textContent = NAV_CONFIG[view].label;
            renderNav();
            renderContent();
        }

        function toggleSidebar() {
            state.sidebarOpen = !state.sidebarOpen;
            const sidebar = document.getElementById('sidebar');
            if (state.sidebarOpen) {
                sidebar.style.width = '16rem';
                sidebar.style.opacity = '1';
            } else {
                sidebar.style.width = '0';
                sidebar.style.opacity = '0';
            }
        }

        // Content Rendering
        function renderContent() {
            const container = document.getElementById('content-area');
            container.innerHTML = '<div class="skeleton w-full h-full rounded-xl"></div>';

            setTimeout(() => {
                switch(state.currentView) {
                    case 'map': renderMap(container); break;
                    case 'alerts': renderAlerts(container); break;
                    case 'queue': renderQueue(container); break;
                    case 'reports': renderReports(container); break;
                    case 'roi': renderROI(container); break;
                    case 'audit-log': renderAuditLog(container); break;
                    case 'eis': renderEIS(container); break;
                    case 'settings': renderSettings(container); break;
                    case 'dashboard': renderDashboard(container); break;
                }
                lucide.createIcons();
            }, 300);
        }

        // MAP VIEW
        function renderMap(container) {
            const criticalZones = state.zones.filter(z => z.severity === 'critical');
            const highZones = state.zones.filter(z => z.severity === 'high');
            const elevatedZones = state.zones.filter(z => z.severity === 'elevated');
            const normalZones = state.zones.filter(z => z.severity === 'normal');

            container.innerHTML = `
                <div class="h-full flex flex-col gap-4 slide-in">
                    <div class="grid grid-cols-4 gap-4">
                        <div class="glass-panel rounded-xl p-4 border-l-4 border-[#EF4444]">
                            <div class="text-[#9CA3AF] text-xs uppercase tracking-wider mb-1">Critical</div>
                            <div class="text-2xl font-bold text-white">${criticalZones.length}</div>
                            <div class="text-xs text-[#EF4444] mt-1">Requires immediate action</div>
                        </div>
                        <div class="glass-panel rounded-xl p-4 border-l-4 border-[#F97316]">
                            <div class="text-[#9CA3AF] text-xs uppercase tracking-wider mb-1">High Loss</div>
                            <div class="text-2xl font-bold text-white">${highZones.length}</div>
                            <div class="text-xs text-[#F97316] mt-1">Investigation recommended</div>
                        </div>
                        <div class="glass-panel rounded-xl p-4 border-l-4 border-[#F59E0B]">
                            <div class="text-[#9CA3AF] text-xs uppercase tracking-wider mb-1">Elevated</div>
                            <div class="text-2xl font-bold text-white">${elevatedZones.length}</div>
                            <div class="text-xs text-[#F59E0B] mt-1">Monitor closely</div>
                        </div>
                        <div class="glass-panel rounded-xl p-4 border-l-4 border-[#10B981]">
                            <div class="text-[#9CA3AF] text-xs uppercase tracking-wider mb-1">Normal</div>
                            <div class="text-2xl font-bold text-white">${normalZones.length}</div>
                            <div class="text-xs text-[#10B981] mt-1">Within baseline</div>
                        </div>
                    </div>

                    <div class="flex-1 glass-panel rounded-xl relative overflow-hidden min-h-[500px]">
                        <div id="map-canvas" class="absolute inset-0 bg-[#0B0F19]">
                            <svg class="w-full h-full" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
                                <defs>
                                    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
                                        <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
                                        <feMerge>
                                            <feMergeNode in="coloredBlur"/>

                                    const size = 60 + Math.random() * 40;

                                        [x + size, y - 20],
                                        [x + size + 30, y + size/2],

                                        [x - 20, y + size - 10]

                                    return `

                                                filter="${zone.severity === 'critical' ? 'url(#glow)' : ''}"

                                                font-weight="500">
                                                ${zone.ntlPct.toFixed(1)}% NTL

        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');

            const colors = {
                success: 'bg-[#0D9E75]',
                error: 'bg-[#EF4444]',
                info: 'bg-[#3B82F6]',
                warning: 'bg-[#F59E0B]'
            };

            const icons = {
                success: 'check-circle',
                error: 'x-circle',
                info: 'info',
                warning: 'alert-triangle'
            };

            toast.className = `toast-enter pointer-events-auto flex items-center gap-3 px-4 py-3 rounded-lg shadow-lg shadow-black/50 ${colors[type]} text-white text-sm font-medium`;
            toast.innerHTML = `
                <i data-lucide="${icons[type]}" class="w-4 h-4"></i>
                <span>${message}</span>
            `;

            container.appendChild(toast);
            lucide.createIcons();

            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(100%)';
                toast.style.transition = 'all 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

                                            <div class="h-full rounded-full bg-[#EF4444]" style="width: ${alert.confidence * 100}%"></div>
                                        </div>
                                        <span class="text-[10px] text-[#9CA3AF]">${(alert.confidence * 100).toFixed(0)}%</span>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>

                    <div class="flex gap-2">
                        <button onclick="navigateTo('alerts'); closeModal();" class="flex-1 py-2 bg-[#0D9E75] hover:bg-[#0D9E75]/90 text-white text-xs font-medium rounded-lg transition-colors">
                            View All Alerts
                        </button>
                        <button onclick="showToast('Zone report downloaded', 'success'); closeModal();" class="px-4 py-2 bg-[#1F2937] hover:bg-[#374151] text-white text-xs rounded-lg transition-colors border border-[#374151]">
                            Download PDF
                        </button>
                    </div>
                </div>
            `);
        }

        function showAlertDetail(alertId) {
            const alert = state.alerts.find(a => a.id === alertId);
            if (!alert) return;

            const zone = state.zones.find(z => z.id === alert.zoneId);
            const typeLabels = { meter_bypass: 'Meter Bypass', illegal_reconnection: 'Illegal Reconnection', token_fraud: 'Token Fraud', phase_tap: 'Phase Tap' };
            const statusLabels = { new: 'New', assigned: 'Assigned', investigating: 'Investigating', confirmed_theft: 'Confirmed Theft', false_positive: 'False Positive', resolved: 'Resolved' };

            showModal('Alert Detail', `
                <div class="space-y-4">
                    <div class="flex items-center justify-between">
                        <div>
                            <div class="text-lg font-bold text-white">${alert.accountNumber}</div>
                            <div class="text-xs text-[#9CA3AF]">${alert.meterSerial} • ${zone?.name || 'Unknown'}</div>
                        </div>
                        <span class="text-xs px-3 py-1 rounded-full font-medium" style="background: ${alert.statusColor}20; color: ${alert.statusColor}; border: 1px solid ${alert.statusColor}40">
                            ${statusLabels[alert.status]}
                        </span>
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <div class="p-3 bg-[#0B0F19] rounded-lg border border-[#374151]">
                            <div class="text-[10px] text-[#9CA3AF] uppercase">Alert Type</div>
                            <div class="text-sm font-bold text-white">${typeLabels[alert.type]}</div>
                        </div>
                        <div class="p-3 bg-[#0B0F19] rounded-lg border border-[#374151]">
                            <div class="text-[10px] text-[#9CA3AF] uppercase">Confidence</div>
                            <div class="text-sm font-bold text-white">${(alert.confidence * 100).toFixed(0)}%</div>
                        </div>
                        <div class="p-3 bg-[#0B0F19] rounded-lg border border-[#374151]">
                            <div class="text-[10px] text-[#9CA3AF] uppercase">Est. Monthly Loss</div>
                            <div class="text-sm font-bold text-[#EF4444]">$${alert.estimatedLoss.toFixed(0)}</div>
                        </div>
                        <div class="p-3 bg-[#0B0F19] rounded-lg border border-[#374151]">
                            <div class="text-[10px] text-[#9CA3AF] uppercase">Created</div>
                            <div class="text-sm font-bold text-white">${new Date(alert.createdAt).toLocaleDateString()}</div>
                        </div>
                    </div>

                    <div class="p-3 bg-[#0B0F19] rounded-lg border border-[#374151]">
                        <div class="text-[10px] text-[#9CA3AF] uppercase mb-1">Anomaly Explanation</div>
                        <div class="text-xs text-white">Consumption is ${(alert.confidence * 400).toFixed(0)}% above zone peer median for 3 consecutive purchase cycles. Pattern indicates potential ${alert.type.replace(/_/g, ' ')}.</div>
                    </div>

                    <div class="flex gap-2">
                        <button onclick="showToast('Alert assigned to field agent', 'success'); closeModal();" class="flex-1 py-2 bg-[#0D9E75] hover:bg-[#0D9E75]/90 text-white text-xs font-medium rounded-lg transition-colors">
                            Assign to Agent
                        </button>
                        <button onclick="showToast('Marked as false positive', 'info'); closeModal();" class="px-4 py-2 bg-[#1F2937] hover:bg-[#374151] text-white text-xs rounded-lg transition-colors border border-[#374151]">
                            False Positive
                        </button>
                    </div>
                </div>
            `);
        }

        function exportCSV() {
            showToast('CSV export started...', 'info');
            setTimeout(() => {
                showToast('CSV downloaded successfully', 'success');
            }, 1500);
        }

        // Simulation
        function startSimulation() {
            state.simulationInterval = setInterval(() => {
                // Randomize 2-3 zones
                const numZones = 2 + Math.floor(Math.random() * 2);
                for (let i = 0; i < numZones; i++) {
                    const zoneIdx = Math.floor(Math.random() * state.zones.length);
                    state.zones[zoneIdx].ntlPct += (Math.random() - 0.5) * 1;
                    state.zones[zoneIdx].lastUpdated = new Date().toISOString();
                }

                // Create 1-3 new alerts
                const numAlerts = 1 + Math.floor(Math.random() * 3);
                for (let i = 0; i < numAlerts; i++) {
                    const newAlert = {
                        id: state.alerts.length + 1,
                        zoneId: Math.floor(Math.random() * 12) + 1,
                        accountNumber: `EDSA-${100000 + state.alerts.length}`,
                        meterSerial: `MTR-${900000 + state.alerts.length}`,
                        type: ['meter_bypass', 'illegal_reconnection', 'token_fraud', 'phase_tap'][Math.floor(Math.random() * 4)],
                        confidence: 0.4 + Math.random() * 0.6,
                        estimatedLoss: 500 + Math.random() * 5000,
                        status: 'new',
                        statusColor: '#3B82F6',
                        assignedTo: null,
                        createdAt: new Date().toISOString(),
                        lat: 8.48 + (Math.random() - 0.5) * 0.06,
                        lng: -13.23 + (Math.random() - 0.5) * 0.06
                    };
                    state.alerts.unshift(newAlert);
                }

                // Update timestamp
                const now = new Date();
                document.getElementById('last-updated').textContent = `Updated ${now.toLocaleTimeString()}`;

                // Show toast for new alerts
                if (numAlerts > 0 && state.currentView !== 'map') {
                    showToast(`${numAlerts} new alert${numAlerts > 1 ? 's' : ''} detected`, 'warning');
                }

                // Refresh current view if on map or alerts
                if (state.currentView === 'map' || state.currentView === 'alerts') {
                    renderContent();
                }
            }, 60000); // Every 60 seconds
        }

        // Close modal on overlay click
        document.getElementById('modal-overlay').addEventListener('click', (e) => {
            if (e.target === document.getElementById('modal-overlay')) {
                closeModal();
            }
        });

        // Enter key on login
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !document.getElementById('login-screen').classList.contains('hidden')) {
                handleLogin();
            }
        });
    </script>
</body>
</html>

<style>
  :root {
    --bg-main: #f8f9fa;
    --bg-card: #ffffff;
    --text-primary: #1a1a1a;
    --text-secondary: #5f6368;
    --text-tertiary: #80868b;
    --border-color: #e0e0e0;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
    --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
    --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -2px rgba(0,0,0,0.05);
    --radius-lg: 12px;
    --transition-fast: 0.2s ease-out;
    --transition-med: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  h2.sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }
  
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background-color: var(--bg-main);
    color: var(--text-primary);
    line-height: 1.5;
  }

  .nav {
    display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 2rem; padding-top: 1.5rem;
    position: sticky; top: 0; background: var(--bg-main); z-index: 10;
    padding-bottom: 1rem; border-bottom: 1px solid var(--border-color);
  }

  .pill {
    padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 500;
    border: 1px solid var(--border-color); background: var(--bg-card); color: var(--text-secondary);
    cursor: pointer; transition: all var(--transition-fast); box-shadow: var(--shadow-sm);
  }

  .pill:hover {
    background: #f0f0f0; border-color: #ccc; transform: translateY(-1px);
  }

  .pill.active {
    background: var(--text-primary); color: #fff; border-color: var(--text-primary);
    box-shadow: var(--shadow-md); transform: translateY(-1px);
  }

  .section { margin-bottom: 2.5rem; }
  .section-header { display: flex; align-items: center; gap: 10px; margin-bottom: 1rem; }
  
  .tech-label {
    font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 6px;
    letter-spacing: .03em; text-transform: uppercase;
  }

  .tl-pinn{background:#E6F1FB;color:#0C447C} .dark .tl-pinn{background:#0C447C;color:#B5D4F4}
  .tl-gen{background:#EAF3DE;color:#27500A} .dark .tl-gen{background:#27500A;color:#C0DD97}
  .tl-gnn{background:#EEEDFE;color:#3C3489} .dark .tl-gnn{background:#3C3489;color:#CECBF6}
  .tl-llm{background:#FAEEDA;color:#633806} .dark .tl-llm{background:#633806;color:#FAC775}
  .tl-ssl{background:#E1F5EE;color:#085041} .dark .tl-ssl{background:#085041;color:#9FE1CB}
  .tl-xai{background:#FCEBEB;color:#791F1F} .dark .tl-xai{background:#791F1F;color:#F7C1C1}
  .tl-mm{background:#FBEAF0;color:#72243E} .dark .tl-mm{background:#72243E;color:#F4C0D1}

  .section-title { font-size: 15px; font-weight: 600; color: var(--text-primary); }

  .cards {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px;
  }

  /* Animation setup */
  .card {
    background: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--radius-lg);
    padding: 16px 18px; cursor: pointer; transition: all var(--transition-med);
    box-shadow: var(--shadow-sm); position: relative; overflow: hidden;
    opacity: 0; transform: translateY(15px);
  }

  .card.visible {
    opacity: 1; transform: translateY(0);
  }

  .card:hover {
    border-color: #bbb; transform: translateY(-4px); box-shadow: var(--shadow-lg);
  }

  .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; gap: 8px; }
  .card-name { font-size: 14px; font-weight: 600; color: var(--text-primary); line-height: 1.3; }
  
  .badge {
    font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 6px; white-space: nowrap;
    text-transform: uppercase; letter-spacing: 0.03em;
  }
  .badge-startup{background:#E1F5EE;color:#085041}
  .badge-established{background:#F1EFE8;color:#5B5B58}
  .badge-research{background:#EEEDFE;color:#3C3489}
  
  .card-desc { font-size: 12.5px; color: var(--text-secondary); line-height: 1.5; margin-bottom: 12px; }
  .card-tags { display: flex; gap: 6px; flex-wrap: wrap; }
  .tag { font-size: 10px; padding: 3px 8px; border-radius: 6px; background: #f1f3f4; color: var(--text-secondary); font-weight: 500; }

  /* Modal Overlay */
  .modal-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); z-index: 50;
    display: flex; align-items: center; justify-content: center; padding: 20px;
    opacity: 0; pointer-events: none; transition: opacity var(--transition-med);
  }
  .modal-overlay.open { opacity: 1; pointer-events: auto; }

  .detail-modal {
    background: var(--bg-card); border-radius: 16px; padding: 24px;
    max-width: 600px; width: 100%; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1), 0 10px 10px -5px rgba(0,0,0,0.04);
    transform: scale(0.95) translateY(10px); transition: transform var(--transition-med);
    max-height: 90vh; overflow-y: auto;
  }
  .modal-overlay.open .detail-modal { transform: scale(1) translateY(0); }

  .modal-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1.25rem; }
  .modal-name { font-size: 18px; font-weight: 700; color: var(--text-primary); padding-right: 16px; }
  
  .close-btn {
    background: #f1f3f4; border: none; font-size: 16px; cursor: pointer; color: var(--text-secondary);
    width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
    transition: all var(--transition-fast);
  }
  .close-btn:hover { background: #e0e0e0; color: var(--text-primary); }

  .modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 1.5rem; }
  .modal-field label { font-size: 11px; color: var(--text-tertiary); margin-bottom: 4px; display: block; font-weight: 600; text-transform: uppercase; }
  .modal-field p { font-size: 13.5px; color: var(--text-primary); margin: 0; line-height: 1.5; }

  .ux-panel { background: #f8f9fa; border-radius: 12px; padding: 16px 20px; border: 1px solid var(--border-color); }
  .ux-title { font-size: 11px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: .06em; margin-bottom: .75rem; }
  .ux-flow { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; font-size: 12px; color: var(--text-primary); }
  .ux-step { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 8px; padding: 6px 12px; font-weight: 500; }
  .ux-arrow { color: var(--text-tertiary); font-size: 12px; }

  /* Utility */
  .fade-container { transition: opacity 0.2s ease; }
  .fade-out { opacity: 0; }
</style>

let activeFilter = 'all';

function filter(f) {
  activeFilter = f;
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  event.target.classList.add('active');
  
  const container = document.getElementById('sections');
  container.classList.add('fade-out');
  
  setTimeout(() => {
    render();
    container.classList.remove('fade-out');
  }, 200);
}

function render() {
  const sections = document.getElementById('sections');
  sections.innerHTML = '';

  if (activeFilter === 'all') {
    const grouped = {};
    software.forEach(s => s.tags.forEach(t => {
      if (!grouped[t]) grouped[t] = [];
      if (!grouped[t].includes(s)) grouped[t].push(s);
    }));
    Object.keys(techMeta).forEach(techKey => {
      if (grouped[techKey]) renderSection(sections, techKey, grouped[techKey]);
    });
  } else {
    const filtered = software.filter(s => s.tags.includes(activeFilter));
    renderSection(sections, activeFilter, filtered);
  }
}

function renderSection(container, techKey, items) {
  const tm = techMeta[techKey];
  const sec = document.createElement('div');
  sec.className = 'section';
  sec.innerHTML = `<div class="section-header"><span class="tech-label ${tm.cls}">${tm.label}</span><span class="section-title">${tm.name}</span></div>`;
  
  const cards = document.createElement('div');
  cards.className = 'cards';
  
  items.forEach((s, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.style.transitionDelay = `${i * 60}ms`;
    
    const badgeClass = s.badge === 'startup' ? 'badge-startup' : s.badge === 'research' ? 'badge badge-research' : 'badge-established';
    const badgeLabel = s.badge === 'startup' ? 'Startup' : s.badge === 'research' ? 'Research' : 'Established';
    
    card.innerHTML = `
      <div class="card-top">
        <div class="card-name">${s.name}</div>
        <span class="badge ${badgeClass}">${badgeLabel}</span>
      </div>
      <div class="card-desc">${s.desc}</div>
      <div class="card-tags">${s.tags.map(t=>`<span class="tag ${techMeta[t].cls}">${techMeta[t].label}</span>`).join('')}</div>`;
    
    card.onclick = () => openDetail(s);
    cards.appendChild(card);
    
    // Trigger animation
    setTimeout(() => card.classList.add('visible'), 50);
  });
  
  sec.appendChild(cards);
  container.appendChild(sec);
}

function openDetail(s) {
  document.getElementById('d-name').textContent = s.name;
  document.getElementById('d-type').textContent = s.badge.charAt(0).toUpperCase() + s.badge.slice(1);
  document.getElementById('d-tech').textContent = s.tech;
  document.getElementById('d-feature').textContent = s.feature;
  document.getElementById('d-users').textContent = s.users;
  
  const flow = document.getElementById('d-flow');
  flow.innerHTML = s.flow.map((step, i) =>
    `${i > 0 ? '<span class="ux-arrow">→</span>' : ''}<span class="ux-step">${step}</span>`
  ).join('');
  
  const overlay = document.getElementById('modalOverlay');
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden'; // Prevent scrolling
}

function closeDetail(event) {
  // If event exists, check if we clicked the overlay background, otherwise allow direct calls
  if (!event || event.target.id === 'modalOverlay') {
    const overlay = document.getElementById('modalOverlay');
    overlay.classList.remove('open');
    document.body.style.overflow = ''; // Restore scrolling
  }
}

// Add escape key listener
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeDetail();
});

render();

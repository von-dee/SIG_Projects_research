<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>20 Startup Ideas — Interactive Explorer</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  :root {
    --bg: #0C0C0E;
    --bg-card: #16161A;
    --bg-card-hover: #1C1C22;
    --fg: #EAEAED;
    --fg-dim: #8888A0;
    --fg-muted: #55556A;
    --accent: #F5A623;
    --accent-glow: rgba(245,166,35,0.15);
    --border: #2A2A36;
    --border-hover: #3E3E50;
    --border-active: #F5A623;
    --teal-bg: rgba(16,185,129,0.12);
    --teal-fg: #34D399;
    --purple-bg: rgba(139,92,246,0.12);
    --purple-fg: #A78BFA;
    --coral-bg: rgba(251,113,72,0.12);
    --coral-fg: #FB9166;
    --amber-bg: rgba(245,166,35,0.12);
    --amber-fg: #F5C462;
    --blue-bg: rgba(59,130,246,0.12);
    --blue-fg: #60A5FA;
    --radius: 14px;
    --radius-sm: 8px;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  html {
    scroll-behavior: smooth;
  }

  body {
    background: var(--bg);
    color: var(--fg);
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* Custom scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--fg-muted); }

  /* Background effects */
  .bg-layer {
    position: fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden;
  }
  .bg-blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0.35;
    animation: blobDrift 20s ease-in-out infinite alternate;
  }
  .bg-blob-1 {
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(245,166,35,0.25), transparent 70%);
    top: -10%; left: -5%;
    animation-duration: 22s;
  }
  .bg-blob-2 {
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(16,185,129,0.18), transparent 70%);
    bottom: 10%; right: -5%;
    animation-duration: 18s;
    animation-delay: -5s;
  }
  .bg-blob-3 {
    width: 350px; height: 350px;
    background: radial-gradient(circle, rgba(139,92,246,0.14), transparent 70%);
    top: 50%; left: 40%;
    animation-duration: 25s;
    animation-delay: -10s;
  }
  @keyframes blobDrift {
    0%   { transform: translate(0, 0) scale(1); }
    33%  { transform: translate(60px, -40px) scale(1.1); }
    66%  { transform: translate(-30px, 50px) scale(0.95); }
    100% { transform: translate(40px, 20px) scale(1.05); }
  }

  /* Dot grid pattern overlay */
  .bg-dots {
    position: fixed; inset:0; z-index:0; pointer-events:none;
    background-image: radial-gradient(circle, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 32px 32px;
  }

  /* Main container */
  .container {
    position: relative;
    z-index: 1;
    max-width: 1320px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  /* Header */
  .page-header {
    text-align: center;
    margin-bottom: 48px;
    opacity: 0;
    transform: translateY(30px);
    animation: fadeUp 0.8s ease forwards;
  }
  .page-header .eyebrow {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 14px;
  }
  .page-header h1 {
    font-size: clamp(32px, 5vw, 56px);
    font-weight: 700;
    line-height: 1.1;
    color: var(--fg);
    margin-bottom: 16px;
  }
  .page-header h1 span {
    background: linear-gradient(135deg, var(--accent), #FF6B6B);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .page-header .subtitle {
    font-size: 15px;
    color: var(--fg-dim);
    max-width: 560px;
    margin: 0 auto;
    line-height: 1.6;
  }

  /* Stats bar */
  .stats-bar {
    display: flex;
    justify-content: center;
    gap: 32px;
    margin-bottom: 36px;
    flex-wrap: wrap;
    opacity: 0;
    transform: translateY(20px);
    animation: fadeUp 0.8s ease 0.15s forwards;
  }
  .stat-item {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .stat-icon {
    width: 32px; height: 32px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
  }
  .stat-item:nth-child(1) .stat-icon { background: var(--teal-bg); color: var(--teal-fg); }
  .stat-item:nth-child(2) .stat-icon { background: var(--purple-bg); color: var(--purple-fg); }
  .stat-item:nth-child(3) .stat-icon { background: var(--coral-bg); color: var(--coral-fg); }
  .stat-item:nth-child(4) .stat-icon { background: var(--amber-bg); color: var(--amber-fg); }
  .stat-label { font-size: 12px; color: var(--fg-muted); }
  .stat-val { font-size: 16px; font-weight: 600; color: var(--fg); }

  /* Filter bar */
  .filter-bar {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 28px;
    justify-content: center;
    opacity: 0;
    transform: translateY(20px);
    animation: fadeUp 0.8s ease 0.25s forwards;
  }
  .filter-btn {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 8px 18px;
    border-radius: 100px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--fg-dim);
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
    position: relative;
    overflow: hidden;
  }
  .filter-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--accent);
    opacity: 0;
    transition: opacity 0.3s;
    border-radius: inherit;
  }
  .filter-btn:hover {
    border-color: var(--border-hover);
    color: var(--fg);
    transform: translateY(-1px);
  }
  .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #0C0C0E;
    font-weight: 600;
    box-shadow: 0 0 20px rgba(245,166,35,0.25);
  }
  .filter-btn .count {
    display: inline-block;
    font-size: 11px;
    background: rgba(255,255,255,0.12);
    padding: 1px 7px;
    border-radius: 20px;
    margin-left: 6px;
    font-weight: 400;
  }
  .filter-btn.active .count {
    background: rgba(0,0,0,0.2);
  }

  /* Grid */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 16px;
  }

  /* Card */
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 22px;
    cursor: pointer;
    transition: all 0.35s cubic-bezier(0.4,0,0.2,1);
    position: relative;
    overflow: hidden;
    opacity: 0;
    transform: translateY(40px) scale(0.97);
  }
  .card.visible {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0;
    transition: opacity 0.4s;
  }
  .card::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(600px circle at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(245,166,35,0.06), transparent 40%);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .card:hover {
    border-color: var(--border-hover);
    background: var(--bg-card-hover);
    transform: translateY(-3px) scale(1);
    box-shadow: 0 12px 40px rgba(0,0,0,0.4), 0 0 0 1px var(--border-hover);
  }
  .card:hover::before { opacity: 1; }
  .card:hover::after { opacity: 1; }
  .card.open {
    border-color: var(--accent);
    box-shadow: 0 8px 32px rgba(245,166,35,0.1), 0 0 0 1px var(--accent);
    background: var(--bg-card-hover);
  }
  .card.open::before { opacity: 1; }

  .card-header {
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }
  .num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    color: var(--fg-muted);
    min-width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255,255,255,0.04);
    border-radius: 6px;
    margin-top: 1px;
    flex-shrink: 0;
    transition: all 0.3s;
  }
  .card:hover .num, .card.open .num {
    color: var(--accent);
    background: var(--accent-glow);
  }
  .card-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--fg);
    line-height: 1.4;
    transition: color 0.3s;
  }
  .card:hover .card-title { color: #fff; }
  .card-body { flex: 1; }
  .badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 6px;
    margin-top: 8px;
    letter-spacing: 0.02em;
  }
  .b-teal   { background: var(--teal-bg);   color: var(--teal-fg); }
  .b-purple { background: var(--purple-bg); color: var(--purple-fg); }
  .b-coral  { background: var(--coral-bg);  color: var(--coral-fg); }
  .b-amber  { background: var(--amber-bg);  color: var(--amber-fg); }
  .b-blue   { background: var(--blue-bg);   color: var(--blue-fg); }

  .toggle-icon {
    margin-left: auto;
    width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%;
    background: rgba(255,255,255,0.04);
    color: var(--fg-muted);
    font-size: 12px;
    flex-shrink: 0;
    transition: all 0.4s cubic-bezier(0.4,0,0.2,1);
    margin-top: 2px;
  }
  .card:hover .toggle-icon { background: rgba(255,255,255,0.08); color: var(--fg-dim); }
  .card.open .toggle-icon {
    transform: rotate(180deg);
    background: var(--accent-glow);
    color: var(--accent);
  }

  /* Detail section */
  .detail {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.5s cubic-bezier(0.4,0,0.2,1), opacity 0.4s, margin-top 0.4s;
    opacity: 0;
    margin-top: 0;
  }
  .card.open .detail {
    max-height: 300px;
    opacity: 1;
    margin-top: 16px;
  }
  .detail-inner {
    border-top: 1px solid var(--border);
    padding-top: 16px;
  }
  .row {
    display: flex;
    gap: 12px;
    margin-bottom: 10px;
    align-items: flex-start;
  }
  .row:last-child { margin-bottom: 0; }
  .label {
    font-size: 10px;
    font-weight: 600;
    color: var(--fg-muted);
    min-width: 110px;
    padding-top: 2px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    flex-shrink: 0;
  }
  .val {
    font-size: 13px;
    color: var(--fg-dim);
    line-height: 1.6;
  }

  /* Toast notification */
  .toast {
    position: fixed;
    bottom: 28px;
    right: 28px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 20px;
    font-size: 13px;
    color: var(--fg-dim);
    z-index: 100;
    opacity: 0;
    transform: translateY(20px) scale(0.95);
    transition: all 0.4s cubic-bezier(0.4,0,0.2,1);
    pointer-events: none;
    box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .toast.show {
    opacity: 1;
    transform: translateY(0) scale(1);
    pointer-events: auto;
  }
  .toast i { color: var(--accent); }

  /* Search bar */
  .search-wrap {
    max-width: 400px;
    margin: 0 auto 28px;
    position: relative;
    opacity: 0;
    transform: translateY(20px);
    animation: fadeUp 0.8s ease 0.3s forwards;
  }
  .search-wrap i {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--fg-muted);
    font-size: 14px;
    transition: color 0.3s;
  }
  .search-input {
    width: 100%;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 11px 18px 11px 42px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px;
    color: var(--fg);
    outline: none;
    transition: all 0.3s;
  }
  .search-input::placeholder { color: var(--fg-muted); }
  .search-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(245,166,35,0.1);
  }
  .search-input:focus + i,
  .search-wrap:focus-within i { color: var(--accent); }

  /* Expand all button */
  .expand-all-btn {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 12px;
    font-weight: 500;
    color: var(--fg-muted);
    background: none;
    border: none;
    cursor: pointer;
    transition: color 0.3s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .expand-all-btn:hover { color: var(--accent); }

  /* Toolbar */
  .toolbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    opacity: 0;
    transform: translateY(20px);
    animation: fadeUp 0.8s ease 0.35s forwards;
  }
  .result-count {
    font-size: 13px;
    color: var(--fg-muted);
  }
  .result-count strong {
    color: var(--fg);
    font-weight: 600;
  }

  /* Particle canvas */
  #particles {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  /* Keyframes */
  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }
  @keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }

  /* Reduced motion */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
    .bg-blob { animation: none !important; }
  }

  /* Responsive */
  @media (max-width: 768px) {
    .container { padding: 24px 16px 60px; }
    .grid { grid-template-columns: 1fr; gap: 12px; }
    .stats-bar { gap: 16px; }
    .filter-bar { gap: 6px; }
    .filter-btn { padding: 6px 14px; font-size: 12px; }
  }
  @media (max-width: 480px) {
    .page-header h1 { font-size: 28px; }
    .card { padding: 16px; }
    .row { flex-direction: column; gap: 4px; }
    .label { min-width: unset; }
  }
</style>
</head>
<body>

<!-- Background layers -->
<div class="bg-layer" aria-hidden="true">
  <div class="bg-blob bg-blob-1"></div>
  <div class="bg-blob bg-blob-2"></div>
  <div class="bg-blob bg-blob-3"></div>
</div>
<div class="bg-dots" aria-hidden="true"></div>
<canvas id="particles" aria-hidden="true"></canvas>

<div class="container">
  <header class="page-header">
    <div class="eyebrow">Strategic Opportunities</div>

  <div class="search-wrap">
    <input type="text" class="search-input" id="searchInput" placeholder="Search ideas, tech, revenue..." aria-label="Search ideas">
    <i class="fas fa-search"></i>
  </div>

  <div class="toolbar">
    <span class="result-count" id="resultCount"></span>
    <button class="expand-all-btn" id="expandAllBtn" aria-label="Expand all cards">
      <i class="fas fa-expand-alt"></i> Expand all
    </button>
  </div>

  <div class="grid" id="grid" role="list"></div>
</div>

<!-- Toast -->
<div class="toast" id="toast" role="status" aria-live="polite">
  <i class="fas fa-info-circle"></i>
  <span id="toastMsg"></span>
</div>

const catMap = {
  content: { label: "Content", icon: "fa-podcast", color: "var(--blue-fg)" },
  data: { label: "Data & AI", icon: "fa-brain", color: "var(--teal-fg)" },
  monetization: { label: "Monetization", icon: "fa-coins", color: "var(--coral-fg)" },
  platform: { label: "Platform", icon: "fa-layer-group", color: "var(--amber-fg)" }
};

let activeFilter = "all";
let searchQuery = "";
let allExpanded = false;

/* ---- Stats bar ---- */
function renderStats() {
  const bar = document.getElementById("statsBar");
  const counts = {};
  ideas.forEach(i => { counts[i.cat] = (counts[i.cat] || 0) + 1; });
  bar.innerHTML = Object.entries(catMap).map(([key, val]) => `
    <div class="stat-item">
      <div class="stat-icon"><i class="fas ${val.icon}"></i></div>
      <div>
        <div class="stat-val">${counts[key]}</div>
        <div class="stat-label">${val.label}</div>
      </div>
    </div>
  `).join("");
}

/* ---- Filters ---- */
function renderFilters() {
  const bar = document.getElementById("filters");
  const counts = { all: ideas.length };
  ideas.forEach(i => { counts[i.cat] = (counts[i.cat] || 0) + 1; });

  bar.innerHTML = `<button class="filter-btn active" data-cat="all" role="tab" aria-selected="true">All <span class="count">${counts.all}</span></button>` +
    Object.entries(catMap).map(([key, val]) =>
      `<button class="filter-btn" data-cat="${key}" role="tab" aria-selected="false">${val.label} <span class="count">${counts[key] || 0}</span></button>`
    ).join("");

  bar.addEventListener("click", e => {
    const btn = e.target.closest(".filter-btn");
    if (!btn) return;
    activeFilter = btn.dataset.cat;
    bar.querySelectorAll(".filter-btn").forEach(b => {
      const isActive = b.dataset.cat === activeFilter;
      b.classList.toggle("active", isActive);
      b.setAttribute("aria-selected", isActive);
    });
    renderGrid();
    showToast(`Showing ${activeFilter === "all" ? "all ideas" : catMap[activeFilter].label.toLowerCase()} ideas`);
  });
}

/* ---- Search ---- */
document.getElementById("searchInput").addEventListener("input", e => {
  searchQuery = e.target.value.toLowerCase().trim();
  renderGrid();
});

/* ---- Grid ---- */
function getFiltered() {
  return ideas.filter(idea => {
    const matchCat = activeFilter === "all" || idea.cat === activeFilter;
    if (!matchCat) return false;
    if (!searchQuery) return true;
    const haystack = (idea.title + idea.badge + idea.model + idea.revenue + idea.stack).toLowerCase();
    return haystack.includes(searchQuery);
  });
}

function renderGrid() {
  const grid = document.getElementById("grid");
  const filtered = getFiltered();

  document.getElementById("resultCount").innerHTML = `Showing <strong>${filtered.length}</strong> of ${ideas.length} ideas`;

  grid.innerHTML = "";
  filtered.forEach((idea, idx) => {
    const realIdx = ideas.indexOf(idea);
    const div = document.createElement("div");
    div.className = "card";
    div.setAttribute("role", "listitem");
    div.setAttribute("tabindex", "0");
    div.setAttribute("aria-label", idea.title);
    div.innerHTML = `
      <div class="card-header">
        <span class="num">${String(realIdx + 1).padStart(2,"0")}</span>
        <div class="card-body">
          <p class="card-title">${highlightSearch(idea.title)}</p>
          <span class="badge ${idea.badgeClass}">${idea.badge}</span>
        </div>
        <span class="toggle-icon"><i class="fas fa-chevron-down"></i></span>
      </div>
      <div class="detail">
        <div class="detail-inner">
          <div class="row"><span class="label">Business model</span><span class="val">${highlightSearch(idea.model)}</span></div>
          <div class="row"><span class="label">Revenue stream</span><span class="val">${highlightSearch(idea.revenue)}</span></div>
          <div class="row"><span class="label">Tech stack</span><span class="val">${highlightSearch(idea.stack)}</span></div>
        </div>
      </div>`;

    // Click to toggle
    div.addEventListener("click", () => toggleCard(div));

    // Keyboard support
    div.addEventListener("keydown", e => {
      if (e.key === "Enter" || e.key === " ") {
        e.preventDefault();
        toggleCard(div);
      }
    });

    // Mouse glow tracking
    div.addEventListener("mousemove", e => {
      const rect = div.getBoundingClientRect();
      div.style.setProperty("--mouse-x", (e.clientX - rect.left) + "px");
      div.style.setProperty("--mouse-y", (e.clientY - rect.top) + "px");
    });

    grid.appendChild(div);

    // Staggered entrance animation
    requestAnimationFrame(() => {
      setTimeout(() => {
        div.classList.add("visible");
      }, idx * 60);
    });
  });
}

function toggleCard(card) {
  const isOpen = card.classList.contains("open");
  // Close all others if not in expand-all mode
  if (!allExpanded) {
    document.querySelectorAll(".card.open").forEach(c => {
      if (c !== card) c.classList.remove("open");
    });
  }
  card.classList.toggle("open", !isOpen);
}

function highlightSearch(text) {
  if (!searchQuery) return text;
  const regex = new RegExp(`(${searchQuery.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
  return text.replace(regex, '<mark style="background:var(--accent-glow);color:var(--accent);padding:1px 3px;border-radius:3px;">$1</mark>');
}

/* ---- Expand all ---- */
document.getElementById("expandAllBtn").addEventListener("click", () => {
  allExpanded = !allExpanded;
  const btn = document.getElementById("expandAllBtn");
  document.querySelectorAll(".card").forEach(c => {
    c.classList.toggle("open", allExpanded);
  });
  btn.innerHTML = allExpanded
    ? '<i class="fas fa-compress-alt"></i> Collapse all'
    : '<i class="fas fa-expand-alt"></i> Expand all';
  showToast(allExpanded ? "All cards expanded" : "All cards collapsed");
});

/* ---- Toast ---- */
let toastTimeout;
function showToast(msg) {
  const toast = document.getElementById("toast");
  const toastMsg = document.getElementById("toastMsg");
  toastMsg.textContent = msg;
  toast.classList.add("show");
  clearTimeout(toastTimeout);
  toastTimeout = setTimeout(() => toast.classList.remove("show"), 2200);
}

/* ---- Particles ---- */
function initParticles() {
  const canvas = document.getElementById("particles");
  const ctx = canvas.getContext("2d");
  let w, h, particles = [];
  const count = 50;

  function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener("resize", resize);

  for (let i = 0; i < count; i++) {
    particles.push({
      x: Math.random() * w,
      y: Math.random() * h,
      vx: (Math.random() - 0.5) * 0.3,
      vy: (Math.random() - 0.5) * 0.3,
      r: Math.random() * 1.5 + 0.5,
      alpha: Math.random() * 0.3 + 0.05
    });
  }

  let mouseX = w / 2, mouseY = h / 2;
  document.addEventListener("mousemove", e => {
    mouseX = e.clientX;
    mouseY = e.clientY;
  });

  function draw() {
    ctx.clearRect(0, 0, w, h);
    particles.forEach(p => {
      p.x += p.vx;
      p.y += p.vy;
      if (p.x < 0) p.x = w;
      if (p.x > w) p.x = 0;
      if (p.y < 0) p.y = h;
      if (p.y > h) p.y = 0;

      // Subtle attraction to mouse
      const dx = mouseX - p.x;
      const dy = mouseY - p.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 200) {
        p.vx += dx * 0.00003;
        p.vy += dy * 0.00003;
      }
      // Damping
      p.vx *= 0.999;
      p.vy *= 0.999;

      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(245,166,35,${p.alpha})`;
      ctx.fill();
    });

    // Draw connections
    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 120) {
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.strokeStyle = `rgba(245,166,35,${0.06 * (1 - dist / 120)})`;
          ctx.lineWidth = 0.5;
          ctx.stroke();
        }
      }
    }

    requestAnimationFrame(draw);
  }
  draw();
}

/* ---- Init ---- */
renderStats();
renderFilters();
renderGrid();
initParticles();

// Initial toast
setTimeout(() => showToast("Click any card to explore the details"), 1200);
</script>
